@if (post) {
  <div class="post-container">
    <div class="post-header">
      <h1>{{post.title}}</h1>
      <h2>{{getPublishedDate()}}</h2>
    </div>
    <div class="post-content"></div>
    <div class="post-footer">
      <div class="post-timestamp">
        ... posted some time around {{getPublishedTime()}}.
      </div>
      <div class="post-index">
        In the not very useful index under:
        @for (tag of post.categories; track tag; let isLast = $last) {
          <span >
            <a [routerLink]="['/category', tag]">{{tag}}</a>{{isLast ? '' : ', '}}
          </span>
        }
      </div>
    </div>
  </div>
}


@if (!post) {
  <div>
    Loading...
  </div>
}
